name: Lorito
options:
  bundleIdPrefix: com.toffguy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  LoritoKit:
    path: Packages/LoritoKit

targets:
  Lorito:
    type: application
    platform: iOS
    sources:
      - path: Lorito/Sources
      - path: Lorito/Assets.xcassets
    dependencies:
      - package: LoritoKit
        product: Features
    # Explicit Info.plist (generated by XcodeGen) so we can declare custom keys
    # like UIBackgroundModes, which GENERATE_INFOPLIST_FILE can't inject.
    info:
      path: Lorito/Info.plist
      properties:
        CFBundleDisplayName: Lorito Español
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # CloudKit needs remote-notification background mode for push-driven sync.
        UIBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toffguy.lorito
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "7"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "3GWRDGA8B7"
        CODE_SIGN_STYLE: Automatic
        # CloudKit: activates private-DB sync (iCloud capability + container on the
        # App ID + production CloudKit schema already deployed).
        CODE_SIGN_ENTITLEMENTS: Lorito/Lorito.entitlements
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) LORITO_CLOUDKIT"

  LoritoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LoritoUITests
    dependencies:
      - target: Lorito
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toffguy.lorito.uitests
        DEVELOPMENT_TEAM: "3GWRDGA8B7"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Lorito:
    build:
      targets:
        Lorito: all
        LoritoUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LoritoUITests
    archive:
      config: Release
