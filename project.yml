name: Lorito
options:
  bundleIdPrefix: com.toffguy
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  LoritoKit:
    path: Packages/LoritoKit

targets:
  Lorito:
    type: application
    platform: iOS
    sources:
      - path: Lorito/Sources
      - path: Lorito/Assets.xcassets
    dependencies:
      - package: LoritoKit
        product: Features
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toffguy.lorito
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "5"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "Lorito Español"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        DEVELOPMENT_TEAM: "3GWRDGA8B7"
        CODE_SIGN_STYLE: Automatic
        # CloudKit: activates private-DB sync. Requires the iCloud capability +
        # container on the App ID and a production CloudKit schema deploy before
        # release (see openspec cloudkit-sync). makeUserContainer() still falls
        # back to local when no iCloud account is available.
        CODE_SIGN_ENTITLEMENTS: Lorito/Lorito.entitlements

  LoritoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LoritoUITests
    dependencies:
      - target: Lorito
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toffguy.lorito.uitests
        DEVELOPMENT_TEAM: "3GWRDGA8B7"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Lorito:
    build:
      targets:
        Lorito: all
        LoritoUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LoritoUITests
    archive:
      config: Release
