name: TestFlight build

# Manually dispatch (on any branch) to build + upload a build to TestFlight
# WITHOUT submitting for App Store review. Used for internal testing (e.g. the
# CloudKit build before the production schema deploy).
on:
  workflow_dispatch: {}

jobs:
  beta:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install fastlane and XcodeGen
        run: brew install fastlane xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Decode App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p fastlane
          printf '%s' "$APP_STORE_CONNECT_API_KEY" | base64 --decode > fastlane/asc_key.p8
          echo "ASC_KEY_PATH=$PWD/fastlane/asc_key.p8" >> "$GITHUB_ENV"

      - name: Decode distribution certificate
        env:
          DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
        run: printf '%s' "$DISTRIBUTION_CERTIFICATE_P12" | base64 --decode > fastlane/certificate.p12

      - name: Build and upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: fastlane ci_beta

      - name: Clean up secrets
        if: always()
        run: rm -f fastlane/asc_key.p8 fastlane/certificate.p12
