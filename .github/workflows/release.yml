name: Release to App Store

# Tag a commit (e.g. `git tag v1.0.1 && git push --tags`) to build, sign,
# upload to TestFlight, and submit for App Store review.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install fastlane and XcodeGen
        run: brew install fastlane xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Create screenshot simulators
        run: |
          set -euo pipefail
          RT=$(xcrun simctl list runtimes --json | python3 -c "import sys,json; rs=[r for r in json.load(sys.stdin)['runtimes'] if r['platform']=='iOS' and r['isAvailable']]; print(sorted(rs, key=lambda r: r['version'])[-1]['identifier'])")
          IPHONE_DT=$(xcrun simctl list devicetypes --json | python3 -c "import sys,json; ds=[d for d in json.load(sys.stdin)['devicetypes'] if 'iPhone' in d['name'] and 'Pro Max' in d['name']]; print(sorted(ds, key=lambda d: d['name'])[-1]['identifier'])")
          IPAD_DT=$(xcrun simctl list devicetypes --json | python3 -c "import sys,json; ds=[d for d in json.load(sys.stdin)['devicetypes'] if 'iPad Pro 13' in d['name']]; print(sorted(ds, key=lambda d: d['name'])[-1]['identifier'])")
          echo "runtime=$RT iPhone=$IPHONE_DT iPad=$IPAD_DT"
          xcrun simctl delete "Lorito iPhone" 2>/dev/null || true
          xcrun simctl delete "Lorito iPad" 2>/dev/null || true
          xcrun simctl create "Lorito iPhone" "$IPHONE_DT" "$RT"
          xcrun simctl create "Lorito iPad" "$IPAD_DT" "$RT"

      - name: Decode App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p fastlane
          printf '%s' "$APP_STORE_CONNECT_API_KEY" | base64 --decode > fastlane/asc_key.p8
          echo "ASC_KEY_PATH=$PWD/fastlane/asc_key.p8" >> "$GITHUB_ENV"

      - name: Decode distribution certificate
        env:
          DISTRIBUTION_CERTIFICATE_P12: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12 }}
        run: printf '%s' "$DISTRIBUTION_CERTIFICATE_P12" | base64 --decode > fastlane/certificate.p12

      - name: Build, upload to TestFlight, and submit for review
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: fastlane ci_release

      - name: Clean up secrets
        if: always()
        run: rm -f fastlane/asc_key.p8 fastlane/certificate.p12
